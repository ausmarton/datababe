name: Build Android APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Decode release keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > android/app/datababe-release.jks

      - name: Create key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          printf 'storeFile=datababe-release.jks\nstorePassword=%s\nkeyAlias=datababe\nkeyPassword=%s\n' \
            "$KEYSTORE_PASSWORD" "$KEY_PASSWORD" > android/key.properties

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
