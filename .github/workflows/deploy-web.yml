name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - run: >
          flutter build web --release
          --dart-define=WEB_API_KEY=${{ secrets.WEB_API_KEY }}
          --dart-define=WEB_APP_ID=${{ secrets.WEB_APP_ID }}
          --dart-define=MESSAGING_SENDER_ID=${{ secrets.MESSAGING_SENDER_ID }}
          --dart-define=FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          --dart-define=AUTH_DOMAIN=${{ secrets.AUTH_DOMAIN }}
          --dart-define=STORAGE_BUCKET=${{ secrets.STORAGE_BUCKET }}
          --dart-define=MEASUREMENT_ID=${{ secrets.MEASUREMENT_ID }}

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: data-babe
