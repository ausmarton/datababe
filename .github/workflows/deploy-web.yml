name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - run: >
          flutter build web --release --base-href /datababe/
          --dart-define=WEB_API_KEY=${{ secrets.WEB_API_KEY }}
          --dart-define=WEB_APP_ID=${{ secrets.WEB_APP_ID }}
          --dart-define=MESSAGING_SENDER_ID=${{ secrets.MESSAGING_SENDER_ID }}
          --dart-define=FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          --dart-define=AUTH_DOMAIN=${{ secrets.AUTH_DOMAIN }}
          --dart-define=STORAGE_BUCKET=${{ secrets.STORAGE_BUCKET }}
          --dart-define=MEASUREMENT_ID=${{ secrets.MEASUREMENT_ID }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - id: deployment
        uses: actions/deploy-pages@v4
