name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.1'

      - run: flutter pub get
      - run: flutter analyze --fatal-warnings
      - run: flutter test

      - name: Decode release keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > android/app/datababe-release.jks

      - name: Create key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          printf 'storeFile=datababe-release.jks\nstorePassword=%s\nkeyAlias=datababe\nkeyPassword=%s\n' \
            "$KEYSTORE_PASSWORD" "$KEY_PASSWORD" > android/key.properties

      - name: Build APK
        run: flutter build apk --release

      - name: Build AAB (for future Play Store)
        run: flutter build appbundle --release

      - name: Rename artifacts with version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp build/app/outputs/flutter-apk/app-release.apk "datababe-${VERSION}.apk"
          cp build/app/outputs/bundle/release/app-release.aab "datababe-${VERSION}.aab"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            datababe-*.apk
            datababe-*.aab
