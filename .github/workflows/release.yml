name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json

      - name: Decode release keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > android/app/datababe-release.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storeFile=datababe-release.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=datababe
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build APK
        run: >
          flutter build apk --release
          --dart-define=ANDROID_API_KEY=${{ secrets.ANDROID_API_KEY }}
          --dart-define=ANDROID_APP_ID=${{ secrets.ANDROID_APP_ID }}
          --dart-define=MESSAGING_SENDER_ID=${{ secrets.MESSAGING_SENDER_ID }}
          --dart-define=FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          --dart-define=STORAGE_BUCKET=${{ secrets.STORAGE_BUCKET }}

      - name: Build AAB (for future Play Store)
        run: >
          flutter build appbundle --release
          --dart-define=ANDROID_API_KEY=${{ secrets.ANDROID_API_KEY }}
          --dart-define=ANDROID_APP_ID=${{ secrets.ANDROID_APP_ID }}
          --dart-define=MESSAGING_SENDER_ID=${{ secrets.MESSAGING_SENDER_ID }}
          --dart-define=FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          --dart-define=STORAGE_BUCKET=${{ secrets.STORAGE_BUCKET }}

      - name: Rename artifacts with version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp build/app/outputs/flutter-apk/app-release.apk "datababe-${VERSION}.apk"
          cp build/app/outputs/bundle/release/app-release.aab "datababe-${VERSION}.aab"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            datababe-*.apk
            datababe-*.aab
