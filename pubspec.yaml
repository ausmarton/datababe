name: datababe
description: "Baby care tracking app for parents and caregivers."
publish_to: 'none'
version: 1.18.0+56

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.5.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Charts
  fl_chart: ^0.70.2

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  csv: ^6.0.0
  file_picker: ^8.1.7
  collection: ^1.19.1
  share_plus: ^10.1.4
  file_saver: ^0.2.14
  path_provider: ^2.1.5

  # Auth
  google_sign_in: ^6.2.2

  # Connectivity
  connectivity_plus: ^6.1.3


  # Local database
  sembast: ^3.7.2
  sembast_web: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
